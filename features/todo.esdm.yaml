apiVersion: schema.esdm.io/given-when-then/v1
kind: feature
name: add-todo
scope:
  domain: todos
  boundedContext: todos
  aggregate: todo
scenarios:
  - name: should-add-todo
    when:
      command: add
      data:
        title: foobar
    then:
      events:
        - event: added
          data:
            id: 1
            title: foobar
            completed: false
  - name: should-auto-increment-todo-id
    given:
      - event: added
        data:
          id: 1
          title: foo
          completed: false
    when:
      command: add
      data:
        title: bar
    then:
      events:
        - event: added
          data:
            id: 2
            title: bar
            completed: false
  - name: should-reject-add-todo-with-empty-title
    when:
      command: add
      data:
        title: ""
    then:
      rejection:
        invariant: title-must-not-be-empty
  - name: should-reject-add-todo-with-whitespace-title
    when:
      command: add
      data:
        title: "   "
    then:
      rejection:
        invariant: title-must-not-be-empty
---
apiVersion: schema.esdm.io/given-when-then/v1
kind: feature
name: toggle-all
scope:
  domain: todos
  boundedContext: todos
  aggregate: todo
scenarios:
  - name: should-toggle-all
    given:
      - event: added
        data:
          id: 1
          title: foo
          completed: false
      - event: added
        data:
          id: 2
          title: bar
          completed: true
    when:
      command: toggle-all
      data:
        checked: true
    then:
      events:
        - event: all-toggled
          data:
            checked: true
---
apiVersion: schema.esdm.io/given-when-then/v1
kind: feature
name: toggle-todo
scope:
  domain: todos
  boundedContext: todos
  aggregate: todo
scenarios:
  - name: should-toggle-todo
    given:
      - event: added
        data:
          id: 1
          title: foo
          completed: false
      - event: added
        data:
          id: 2
          title: bar
          completed: true
    when:
      command: toggle
      data:
        id: 1
    then:
      events:
        - event: toggled
          data:
            id: 1
            completed: true
  - name: should-reject-toggle-for-unknown-id
    given:
      - event: added
        data:
          id: 1
          title: foo
          completed: false
    when:
      command: toggle
      data:
        id: 2
    then:
      rejection:
        invariant: todo-must-exist
