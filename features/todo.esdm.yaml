apiVersion: schema.esdm.io/given-when-then/v1
kind: feature
name: clear-completed
scope:
  domain: todos
  boundedContext: todos
  aggregate: todo
scenarios:
  - name: should-clear-completed
    given:
      - event: added
        data:
          id: 1
          title: foo
          completed: false
      - event: added
        data:
          id: 2
          title: bar
          completed: true
    when:
      command: clear-completed
      data: {}
    then:
      events:
        - event: completed-cleared
          data:
            ids:
              - 2
