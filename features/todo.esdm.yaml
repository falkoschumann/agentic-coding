apiVersion: schema.esdm.io/given-when-then/v1
kind: feature
name: save-todo
scope:
  domain: todos
  boundedContext: todos
  aggregate: todo
scenarios:
  - name: should-save-todo
    given:
      - event: added
        data:
          id: 1
          title: foo
          completed: false
      - event: added
        data:
          id: 2
          title: bar
          completed: true
    when:
      command: save
      data:
        id: 1
        title: lorem ipsum
    then:
      events:
        - event: saved
          data:
            id: 1
            title: lorem ipsum
  - name: should-reject-save-with-empty-title
    given:
      - event: added
        data:
          id: 1
          title: foo
          completed: false
    when:
      command: save
      data:
        id: 1
        title: ""
    then:
      rejection:
        invariant: title-must-not-be-empty
  - name: should-reject-save-with-whitespace-title
    given:
      - event: added
        data:
          id: 1
          title: foo
          completed: false
    when:
      command: save
      data:
        id: 1
        title: "   "
    then:
      rejection:
        invariant: title-must-not-be-empty
  - name: should-reject-save-for-unknown-id
    given:
      - event: added
        data:
          id: 1
          title: foo
          completed: false
    when:
      command: save
      data:
        id: 2
        title: lorem ipsum
    then:
      rejection:
        invariant: todo-must-exist
